name: Terraform Pipeline

on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:

  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # DEV
      - name: Dev Init
        if: github.ref == 'refs/heads/dev'
        run: |
          cd envs/dev
          terraform init

      - name: Dev Plan
        if: github.ref == 'refs/heads/dev'
        run: |
          cd envs/dev
          terraform plan

      - name: Dev Apply
        if: github.ref == 'refs/heads/dev'
        run: |
          cd envs/dev
          terraform apply -auto-approve

      # STAGING
      - name: Staging Init
        if: github.ref == 'refs/heads/staging'
        run: |
          cd envs/staging
          terraform init

      - name: Staging Plan
        if: github.ref == 'refs/heads/staging'
        run: |
          cd envs/staging
          terraform plan

      - name: Staging Apply
        if: github.ref == 'refs/heads/staging'
        run: |
          cd envs/staging
          terraform apply -auto-approve

      # PROD (only plan here)
      - name: Prod Init
        if: github.ref == 'refs/heads/main'
        run: |
          cd envs/prod
          terraform init

      - name: Prod Plan
        if: github.ref == 'refs/heads/main'
        run: |
          cd envs/prod
          terraform plan


  # 👇 ADD THIS HERE (same level as terraform)
  prod-apply:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod   # 🔐 this enables approval

    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - run: |
          cd envs/prod
          terraform init
          terraform apply -auto-approve