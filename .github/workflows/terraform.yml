name: Terraform CI/CD

on:
  pull_request:
  push:
    branches:
      - dev
      - staging
      - main

env:
  AWS_REGION: ap-south-1

jobs:

# ================= COMMON CHECKS =================
  checks:
    name: Format & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Init (Dev)
        working-directory: envs/dev
        run: terraform init -backend=false

      - name: Validate (Dev)
        working-directory: envs/dev
        run: terraform validate


# ================= PLAN =================
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ---------------- DEV ----------------
      - name: Init Dev
        if: github.ref == 'refs/heads/dev'
        working-directory: envs/dev
        run: terraform init -reconfigure

      - name: Plan Dev
        if: github.ref == 'refs/heads/dev'
        working-directory: envs/dev
        run: terraform plan -out=tfplan

      - name: Upload Dev Plan
        if: github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: envs/dev/tfplan

      # ---------------- STAGING ----------------
      - name: Init Staging
        if: github.ref == 'refs/heads/staging'
        working-directory: envs/staging
        run: terraform init -reconfigure

      - name: Plan Staging
        if: github.ref == 'refs/heads/staging'
        working-directory: envs/staging
        run: terraform plan -out=tfplan

      - name: Upload Staging Plan
        if: github.ref == 'refs/heads/staging'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-staging
          path: envs/staging/tfplan

      # ---------------- PROD ----------------
      - name: Init Prod
        if: github.ref == 'refs/heads/main'
        working-directory: envs/prod
        run: terraform init -reconfigure

      - name: Plan Prod
        if: github.ref == 'refs/heads/main'
        working-directory: envs/prod
        run: terraform plan -out=tfplan

      - name: Upload Prod Plan
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: envs/prod/tfplan


# ================= APPLY DEV =================
  apply-dev:
    name: Apply Dev
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Dev Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: envs/dev

      # ✅ FIX: INIT ADDED HERE
      - name: Init Dev
        working-directory: envs/dev
        run: terraform init -reconfigure

      - name: Apply Dev
        working-directory: envs/dev
        run: terraform apply -input=false tfplan


# ================= APPLY STAGING =================
  apply-staging:
    name: Apply Staging
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Staging Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-staging
          path: envs/staging

      # ✅ FIX: INIT ADDED HERE
      - name: Init Staging
        working-directory: envs/staging
        run: terraform init -reconfigure

      - name: Apply Staging
        working-directory: envs/staging
        run: terraform apply -input=false tfplan


# ================= APPLY PROD =================
  apply-prod:
    name: Apply Production
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod

    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Prod Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: envs/prod

      # ✅ FIX: INIT ADDED HERE
      - name: Init Prod
        working-directory: envs/prod
        run: terraform init -reconfigure

      - name: Apply Prod
        working-directory: envs/prod
        run: terraform apply -input=false tfplan